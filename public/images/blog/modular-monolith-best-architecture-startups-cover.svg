<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Modular monolith for startups illustration</title>
  <desc id="desc">A dark themed architectural diagram showing a startup-friendly modular monolith with clear internal modules and a single deployable runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="100%" stop-color="#151d33" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111a30" />
      <stop offset="100%" stop-color="#0d1426" />
    </linearGradient>
    <linearGradient id="moduleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="moduleTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="moduleGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="modulePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.08)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.35" />
  <circle cx="1350" cy="120" r="220" fill="#3b82f6" opacity="0.08" />
  <circle cx="220" cy="760" r="260" fill="#06b6d4" opacity="0.07" />

  <g filter="url(#shadow)">
    <rect x="170" y="120" width="1260" height="660" rx="36" fill="url(#panel)" stroke="rgba(148,163,184,0.16)" />
  </g>

  <text x="230" y="205" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">
    Modular Monolith
  </text>
  <text x="230" y="250" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    Startup speed now, clean extraction paths later.
  </text>

  <g>
    <rect x="230" y="290" width="220" height="44" rx="22" fill="rgba(59,130,246,0.14)" stroke="rgba(96,165,250,0.35)" />
    <circle cx="262" cy="312" r="7" fill="#60a5fa" />
    <text x="284" y="320" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">
      Single deployable
    </text>
  </g>

  <g>
    <rect x="1180" y="170" width="190" height="124" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(148,163,184,0.14)" />
    <text x="1190" y="214" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600">
      Why it fits
    </text>
    <text x="1190" y="248" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      " Faster shipping
    </text>
    <text x="1190" y="276" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      " Lower ops burden
    </text>
  </g>

  <g stroke="rgba(96,165,250,0.22)" stroke-width="2">
    <line x1="800" y1="360" x2="800" y2="640" />
    <line x1="520" y1="500" x2="1080" y2="500" />
  </g>

  <g>
    <rect x="505" y="345" width="210" height="130" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(59,130,246,0.30)" />
    <rect x="527" y="367" width="46" height="46" rx="14" fill="url(#moduleBlue)" />
    <text x="593" y="397" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Orders</text>
    <text x="527" y="435" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Checkout + order flow</text>
    <text x="527" y="462" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="16">Public commands + events</text>
  </g>

  <g>
    <rect x="885" y="345" width="210" height="130" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(16,185,129,0.30)" />
    <rect x="907" y="367" width="46" height="46" rx="14" fill="url(#moduleGreen)" />
    <text x="973" y="397" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Billing</text>
    <text x="907" y="435" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Invoices + payments</text>
    <text x="907" y="462" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="16">No direct DB coupling</text>
  </g>

  <g>
    <rect x="505" y="525" width="210" height="130" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(6,182,212,0.30)" />
    <rect x="527" y="547" width="46" height="46" rx="14" fill="url(#moduleTeal)" />
    <text x="593" y="577" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Catalog</text>
    <text x="527" y="615" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Products + pricing</text>
    <text x="527" y="642" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="16">Internal API boundaries</text>
  </g>

  <g>
    <rect x="885" y="525" width="210" height="130" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(139,92,246,0.30)" />
    <rect x="907" y="547" width="46" height="46" rx="14" fill="url(#modulePurple)" />
    <text x="973" y="577" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Identity</text>
    <text x="907" y="615" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Users + auth</text>
    <text x="907" y="642" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="16">Separate policies + models</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="800" cy="500" r="92" fill="#0f172a" stroke="rgba(96,165,250,0.35)" />
    <circle cx="800" cy="500" r="60" fill="rgba(59,130,246,0.10)" stroke="rgba(96,165,250,0.20)" />
  </g>
  <text x="800" y="490" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Module
  </text>
  <text x="800" y="520" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="19">
    contracts
  </text>

  <g stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.75">
    <line x1="715" y1="420" x2="760" y2="460" />
    <line x1="885" y1="420" x2="840" y2="460" />
    <line x1="715" y1="580" x2="760" y2="540" />
    <line x1="885" y1="580" x2="840" y2="540" />
  </g>

  <g>
    <rect x="226" y="698" width="1148" height="36" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(148,163,184,0.10)" />
    <text x="574" y="722" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Simpler local development
    </text>
    <text x="800" y="722" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Faster iteration
    </text>
    <text x="1030" y="722" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Easier extraction later
    </text>
  </g>
</svg>
