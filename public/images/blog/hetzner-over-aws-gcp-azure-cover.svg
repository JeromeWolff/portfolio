<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hetzner versus hyperscalers cost and infrastructure illustration</title>
  <desc id="desc">A dark themed comparison cover showing Hetzner highlighted for lower cost and simpler infrastructure compared to AWS, GCP, and Azure for typical workloads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#151d33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10192d"/>
      <stop offset="100%" stop-color="#0d1426"/>
    </linearGradient>
    <linearGradient id="hetzner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="azure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="120" r="220" fill="#ef4444" opacity="0.08"/>
  <circle cx="240" cy="760" r="260" fill="#3b82f6" opacity="0.06"/>

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="1360" height="680" rx="40" fill="url(#panel)" stroke="rgba(148,163,184,0.14)"/>
  </g>

  <text x="190" y="205" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">
    Hetzner vs Hyperscalers
  </text>
  <text x="190" y="248" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    Lower cost, simpler ops, enough cloud for most real workloads.
  </text>

  <g>
    <rect x="200" y="292" width="194" height="44" rx="22" fill="rgba(239,68,68,0.14)" stroke="rgba(248,113,113,0.28)"/>
    <circle cx="220" cy="314" r="7" fill="#f87171"/>
    <text x="240" y="321" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">
      Cost-first default
    </text>
  </g>

  <g>
    <rect x="210" y="378" width="1180" height="300" rx="30" fill="rgba(255,255,255,0.02)" stroke="rgba(148,163,184,0.10)"/>
    <text x="248" y="430" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">
      Approximate monthly cost for 8 vCPU / 32GB class workloads
    </text>

    <text x="250" y="505" fill="#fecaca" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Hetzner</text>
    <rect x="410" y="478" width="250" height="42" rx="21" fill="url(#hetzner)"/>
    <text x="690" y="507" fill="#fca5a5" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">~EUR 77</text>

    <text x="250" y="565" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">AWS</text>
    <rect x="410" y="538" width="560" height="42" rx="21" fill="url(#aws)"/>
    <text x="1000" y="567" fill="#fcd34d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">~USD 230-310</text>

    <text x="250" y="625" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">GCP</text>
    <rect x="410" y="598" width="520" height="42" rx="21" fill="url(#gcp)"/>
    <text x="960" y="627" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">~USD 290</text>

    <text x="250" y="685" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Azure</text>
    <rect x="410" y="658" width="580" height="42" rx="21" fill="url(#azure)"/>
    <text x="1020" y="687" fill="#67e8f9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">~USD 320</text>
  </g>

  <g>
    <rect x="1100" y="170" width="260" height="142" rx="26" fill="rgba(255,255,255,0.03)" stroke="rgba(148,163,184,0.14)"/>
    <text x="1130" y="214" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600">
      Why it wins
    </text>
    <text x="1130" y="248" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      - better price/performance
    </text>
    <text x="1130" y="276" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      - simpler Terraform + ops
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="726" width="1160" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="rgba(148,163,184,0.10)"/>
    <text x="455" y="748" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Kubernetes-friendly
    </text>
    <text x="800" y="748" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      GDPR-friendly EU hosting
    </text>
    <text x="1145" y="748" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      Move to hyperscalers only when needed
    </text>
  </g>
</svg>
