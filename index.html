<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- SEO: Primary meta -->
    <title>Jerome Wolff | Full Stack Developer & CTO</title>
    <meta
      name="description"
      content="Full Stack Developer and CTO specializing in Java, TypeScript, React Native, Spring, and scalable systems. Portfolio, projects, and experience."
    />
    <meta
      name="keywords"
      content="Jerome Wolff, Full Stack Developer, Java, TypeScript, React Native, Spring, MySQL, Redis, CTO, Managing Director, web development, mobile games, marketplace, multiplayer, developer portfolio"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Jerome Wolff" />
    <!-- Dark theme & PWA -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0e17" />
    <!-- Open Graph -->
    <meta property="og:site_name" content="Jerome Wolff" />
    <meta property="og:title" content="Jerome Wolff | Full Stack Developer & CTO" />
    <meta
      property="og:description"
      content="Full Stack Developer and CTO. Java, TypeScript, React Native, Spring. Portfolio and experience."
    />
    <meta property="og:image" content="https://www.jeromewolff.de/android-chrome-512x512.png" />
    <meta property="og:url" content="https://www.jeromewolff.de" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jerome Wolff | Full Stack Developer & CTO" />
    <meta
      name="twitter:description"
      content="Full Stack Developer and CTO. Portfolio, projects, and experience."
    />
    <meta name="twitter:image" content="https://www.jeromewolff.de/android-chrome-512x512.png" />
    <meta name="twitter:site" content="@LinuxServerDEV" />
    <meta name="twitter:creator" content="@LinuxServerDEV" />
    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Critical hero CSS: system fonts only, no external font (no font-display / gstatic) -->
    <style>
      body {
        background: #0a0e17;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #root .hero-section {
        width: 100%;
        background: linear-gradient(180deg, #0f1629 0%, #0a0e17 100%);
        color: #e2e8f0;
        padding: 2.5rem 0 2rem;
        display: flex;
        justify-content: center;
      }
      #root .hero-content {
        max-width: 640px;
        width: 100%;
        text-align: center;
        margin: 0 auto;
        padding: 0 1rem;
        box-sizing: border-box;
      }
      #root .hero-title {
        font-family: inherit;
        font-size: clamp(1.875rem, 5vw, 3rem);
        font-weight: 700;
        margin: 0 0 0.75rem;
        color: #e2e8f0;
        letter-spacing: -0.02em;
        line-height: 1.15;
      }
      #root .hero-subtext {
        font-family: inherit;
        font-size: 1.125rem;
        color: #94a3b8;
        margin: 0;
        line-height: 1.6;
      }
      #root .hero-placeholder {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e17;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- JSON-LD structured data for SEO (Person + WebSite) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "name": "Jerome Wolff",
            "jobTitle": "Full Stack Developer",
            "url": "https://www.jeromewolff.de",
            "sameAs": [
              "https://github.com/JeromeWolff",
              "https://www.linkedin.com/in/jerome-wolff"
            ],
            "email": "hello@jeromewolff.de"
          },
          {
            "@type": "WebSite",
            "name": "Jerome Wolff Portfolio",
            "url": "https://www.jeromewolff.de",
            "author": { "@type": "Person", "name": "Jerome Wolff" },
            "description": "Full Stack Developer and CTO portfolio - projects, skills, experience."
          }
        ]
      }
    </script>
    <div id="root">
      <!-- Static hero shell: LCP element (h1) visible before JS, replaced by React -->
      <div class="hero-placeholder" aria-hidden="true">
        <section id="hero" class="hero-section" aria-labelledby="hero-title">
          <div class="hero-content">
            <h1 id="hero-title" class="hero-title">Jerome Wolff</h1>
            <p class="hero-subtext">
              Software Architect &amp; Full-Stack Engineer (Java/Cloud). Building scalable backend
              systems, cloud-native platforms, and pragmatic developer workflows.
            </p>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="src/index.tsx"></script>
  </body>
</html>
